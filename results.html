<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizPulse - Şampiyonlar</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        .podium-container {
            display: none;
            justify-content: center;
            align-items: flex-end;
            gap: 1rem;
            height: 400px;
            margin-top: 4rem;
            margin-bottom: 2rem;
            perspective: 1000px;
        }

        .podium-col {
            width: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(200px) scale(0.8) rotateX(30deg);
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .podium-col.reveal {
            opacity: 1;
            transform: translateY(0) scale(1) rotateX(0);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .podium-step {
            width: 100%;
            background: linear-gradient(180deg, var(--glass-bg) 0%, rgba(0,0,0,0.3) 100%);
            border: 2px solid var(--glass-border);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        .step-1 { height: 180px; border-color: #fbbf24; background: linear-gradient(180deg, rgba(251,191,36,0.2) 0%, rgba(0,0,0,0.4) 100%); }
        .step-2 { height: 140px; border-color: #94a3b8; }
        .step-3 { height: 100px; border-color: #b45309; }

        .podium-avatar {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
        }

        .podium-name {
            font-weight: 900;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
            width: 180px;
        }

        .podium-score {
            font-size: 1.2rem;
            color: var(--success);
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        /* 1st Place Dominance */
        .step-1-info .podium-avatar { font-size: 7rem; }
        .step-1-info .podium-name { font-size: 2.5rem; width: 250px; color: #fbbf24; }
        .step-1-info .podium-score { font-size: 3.5rem !important; color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.4); }

        .crown {
            position: absolute;
            top: -60px;
            font-size: 4rem;
            animation: bounce 1s infinite alternate;
        }

        @keyframes podiumBounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        .leaderboard-list {
            margin-top: 3rem;
            max-width: 700px;
            margin-inline: auto;
            position: relative;
            height: 500px; /* Space for items to move */
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem !important;
            background: var(--glass-bg);
            border-radius: 14px;
            margin-bottom: 0.75rem;
            border: 2px solid var(--glass-border);
            position: absolute;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s ease-out, box-shadow 0.3s ease;
            height: 90px;
            transform-origin: center left;
        }

        .leaderboard-item:hover {
            transform: scale(1.02) translateX(10px) !important; /* overrides translateY slightly visually but needs care */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .leaderboard-item.top-1 { border-color: #fbbf24; background: linear-gradient(90deg, rgba(251, 191, 36, 0.2) 0%, rgba(251, 191, 36, 0.05) 100%); box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .leaderboard-item.top-2 { border-color: #94a3b8; }
        .leaderboard-item.top-3 { border-color: #b45309; }

        .rank {
            font-weight: 900;
            font-size: 2rem !important;
            color: var(--primary);
            width: 50px !important;
        }

        .avatar {
            font-size: 3rem !important;
            margin-right: 1.5rem;
        }

        .nickname span {
            font-size: 1.8rem;
            font-weight: 900;
            display: block;
        }

        .nickname small {
            font-size: 0.9rem !important;
            opacity: 0.7;
        }

        .score-container {
            text-align: right;
        }

        .score {
            font-size: 2.5rem !important;
            font-weight: 900 !important;
            color: var(--success);
            line-height: 1;
        }

        .streak-fire {
            color: #fbbf24;
            font-weight: 800;
            font-size: 1.1rem;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .top-1 { animation: pulse-gold 2.5s infinite; }

        @keyframes champion-pop {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.15); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        
        @keyframes slideInEpic {
            0% { transform: translateX(-150vw) scale(0.5) rotate(-10deg); opacity: 0; }
            60% { transform: translateX(20px) scale(1.05) rotate(2deg); opacity: 1; }
            100% { transform: translateX(0) scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes reactionFloat {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; transform: translateY(-20px) scale(1.2) rotate(-5deg); }
            80% { opacity: 1; transform: translateY(-70vh) scale(1) rotate(5deg); }
            100% { transform: translateY(-100vh) scale(0.5) rotate(0deg); opacity: 0; }
        }

        .floating-reaction {
            position: fixed;
            bottom: -50px;
            z-index: 2000;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: reactionFloat 4s ease-out forwards;
            white-space: nowrap;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Player reaction bar scrolling */
        .reaction-scroll-container {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none; /* Firefox */
        }
        .reaction-scroll-container::-webkit-scrollbar { display: none; } /* Chrome */
        
        .reaction-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            padding: 0.6rem 1rem;
            border-radius: 20px;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .reaction-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px) scale(1.05); }
    </style>
</head>
<body>
    <div id="reaction-container"></div>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="brand-logo" style="margin-bottom: 2rem; flex-direction: column; gap: 0.2rem;">
        <img src="logo.png" alt="FAHOT" style="height: 100px; filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.4));">
        <span style="font-size: 0.7rem; font-weight: 900; color: var(--primary); letter-spacing: 0.3em; opacity: 0.8;">BY FATİH</span>
    </div>
    <div class="container fade-in" style="max-width: 900px;">
        <h1 id="title" style="margin-bottom: 0.5rem;">Sıralama</h1>
        <p class="subtitle" id="subtitle">Zirvedekiler ve Puan Durumu</p>
        
        <!-- Podium Scene -->
        <div id="podium" class="podium-container">
            <div id="podium-2" class="podium-col">
                <div class="podium-avatar" id="p2-avatar">🥈</div>
                <div class="podium-name" id="p2-name">-</div>
                <div class="podium-score" id="p2-score">0 pt</div>
                <div class="podium-step step-2">2</div>
            </div>
            <div id="podium-1" class="podium-col step-1-info">
                <div class="crown">👑</div>
                <div class="podium-avatar" id="p1-avatar">🥇</div>
                <div class="podium-name" id="p1-name">-</div>
                <div class="podium-score" id="p1-score">0 pt</div>
                <div class="podium-step step-1">1</div>
            </div>
            <div id="podium-3" class="podium-col">
                <div class="podium-avatar" id="p3-avatar">🥉</div>
                <div class="podium-name" id="p3-name">-</div>
                <div class="podium-score" id="p3-score">0 pt</div>
                <div class="podium-step step-3">3</div>
            </div>
        </div>

        <div class="glass-card" id="list-card" style="padding: 1.5rem; display: none;">
            <div id="leaderboard"></div>

            <div id="host-controls" style="display: none; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--glass-border); flex-direction: column; gap: 1rem;">
                <button class="btn" id="btn-next">
                    <span>Sıradaki Soru</span>
                    <i data-lucide="chevron-right"></i>
                </button>
                <button class="btn btn-secondary" onclick="window.location.href += '&final=true'">
                    <i data-lucide="trophy"></i> Yarışmayı Bitir & Final Yap
                </button>
            </div>

            <button class="btn" id="btn-home" style="display: none; margin-top: 2rem;" onclick="window.location.href='index.html'">
                Ana Sayfaya Dön
            </button>
        </div>
    </div>

    <!-- REACTION BAR FOR PLAYERS -->
    <div id="reaction-bar" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 24px; border: 1px solid var(--glass-border); z-index: 100; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
        <p style="font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-bottom: 0.5rem; font-weight: 700;">TEPKİNİ GÖSTER</p>
        <div class="reaction-scroll-container">
            <button class="reaction-btn" onclick="sendReaction(event, '🔥 Vay canına!')">🔥 Vay canına!</button>
            <button class="reaction-btn" onclick="sendReaction(event, '🤯 İnanılmaz')">🤯 İnanılmaz</button>
            <button class="reaction-btn" onclick="sendReaction(event, '😎 Çok Havalı!')">😎 Çok Havalı!</button>
            <button class="reaction-btn" onclick="sendReaction(event, '🚀 Uçuruyorsun!')">🚀 Uçuruyorsun!</button>
            <button class="reaction-btn" onclick="sendReaction(event, '🥶 Ne Yaptın Sen?')">🥶 Ne Yaptın Sen?</button>
            <button class="reaction-btn" onclick="sendReaction(event, '👏 Harika!')">👏 Harika!</button>
            <button class="reaction-btn" onclick="sendReaction(event, '🏆 Helal Olsun!')">🏆 Helal Olsun!</button>
            <button class="reaction-btn" onclick="sendReaction(event, '😂 Koptum')">😂 Koptum</button>
            <button class="reaction-btn" onclick="sendReaction(event, '🤔 Nasıl Yani?')">🤔 Nasıl Yani?</button>
            <button class="reaction-btn" onclick="sendReaction(event, '❤️ Mükemmel')">❤️ Mükemmel</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const client = window.supabaseClient;
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get('gameId');
        const playerId = params.get('playerId');
        const nextIdx = params.get('next');
        const isFinal = params.get('final') === 'true';

        async function load() {
            const { data: players } = await client.from('players').select('nickname, score, avatar, team, streak').eq('game_id', gameId).order('score', { ascending: false });
            if (!players) return;

            if (isFinal) {
                document.getElementById('title').textContent = "BÜYÜK FİNAL!";
                document.getElementById('subtitle').textContent = "Sonuçlar ve İstatistikler";
                document.getElementById('podium').style.display = 'flex';
                
                // --- FEATURE #5: DIFFICULTY ANALYZER ---
                const { data: resps } = await client.from('responses').select('question_index, selected_option').eq('game_id', gameId);
                const { data: qs } = await client.from('questions').select('id, question_text, correct_index').eq('game_id', gameId);
                
                if (resps && qs) {
                    const counts = {};
                    resps.forEach(r => counts[r.question_index] = (counts[r.question_index] || 0) + 1);
                    const hardestIdx = Object.keys(counts).reduce((a, b) => counts[a] < counts[b] ? a : b);
                    const hardestQ = qs[hardestIdx]?.question_text || "Belirlenemedi";
                    
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <div class="glass-card fade-in" style="margin-top: 2rem; border-color: var(--accent); background: rgba(244, 63, 94, 0.05);">
                            <h3 style="color: var(--accent); margin-bottom:0.5rem;">🧠 BERYİN YAKAN SORU</h3>
                            <p style="font-weight: 700;">&quot;${hardestQ}&quot;</p>
                        </div>
                    `;
                    document.querySelector('.container').appendChild(div);

                    // Soru İstatistikleri
                    const statsHtml = qs.map((q, i) => {
                        const qResps = resps.filter(r => r.question_index == i);
                        const correctCount = qResps.filter(r => String(r.selected_option) === String(q.correct_index)).length;
                        const total = qResps.length;
                        const rate = total > 0 ? Math.round(correctCount / total * 100) : 0;
                        const color = rate > 70 ? '#10b981' : rate > 40 ? '#f59e0b' : '#ef4444';
                        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--glass-border);gap:1rem;">
                            <div style="flex:1;font-size:0.82rem;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${i+1}. ${q.question_text}</div>
                            <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;">
                                <div style="width:70px;height:7px;background:rgba(255,255,255,0.1);border-radius:4px;"><div style="width:${rate}%;height:100%;background:${color};border-radius:4px;"></div></div>
                                <span style="color:${color};font-weight:800;font-size:0.85rem;min-width:36px;">${rate}%</span>
                            </div>
                        </div>`;
                    }).join('');

                    const statsDiv = document.createElement('div');
                    statsDiv.innerHTML = `<div class="glass-card fade-in" style="margin-top:1.5rem;text-align:left;"><h3 style="color:var(--primary);margin-bottom:1rem;">📊 Soru İstatistikleri</h3>${statsHtml}</div>`;
                    document.querySelector('.container').appendChild(statsDiv);
                }

                // Set Podium
                if (players[0]) {
                    document.getElementById('p1-name').innerHTML = `${players[0].nickname}<br><small style="font-size:0.6rem; opacity:0.7;">${players[0].team}</small>`;
                    document.getElementById('p1-score').textContent = players[0].score + ' pt';
                    document.getElementById('p1-avatar').textContent = players[0].avatar || '🥇';
                }
                if (players[1]) {
                    document.getElementById('p2-name').innerHTML = `${players[1].nickname}<br><small style="font-size:0.6rem; opacity:0.7;">${players[1].team}</small>`;
                    document.getElementById('p2-score').textContent = players[1].score + ' pt';
                    document.getElementById('p2-avatar').textContent = players[1].avatar || '🥈';
                }
                if (players[2]) {
                    document.getElementById('p3-name').innerHTML = `${players[2].nickname}<br><small style="font-size:0.6rem; opacity:0.7;">${players[2].team}</small>`;
                    document.getElementById('p3-score').textContent = players[2].score + ' pt';
                    document.getElementById('p3-avatar').textContent = players[2].avatar || '🥉';
                }

                // SEQUENCE ANIMATION: 3 -> 2 -> 1
                setTimeout(() => { 
                    document.getElementById('podium-3').classList.add('reveal');
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3').play();
                }, 1000);
                setTimeout(() => { 
                    document.getElementById('podium-2').classList.add('reveal');
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3').play();
                }, 2800);
                setTimeout(() => { 
                    const p1 = document.getElementById('podium-1');
                    p1.classList.add('reveal');
                    p1.style.animation = 'champion-pop 1s ease-out';
                    new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3').play();
                    
                    // Epic confetti sequence
                    const duration = 3000;
                    const end = Date.now() + duration;
                    (function frame() {
                        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#fbbf24', '#f43f5e'] });
                        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#6366f1', '#a855f7'] });
                        if (Date.now() < end) requestAnimationFrame(frame);
                    }());
                    
                    document.getElementById('list-card').style.display = 'block';
                    document.getElementById('list-card').style.animation = 'fadeIn 1s ease-in';
                    document.getElementById('btn-home').style.display = 'flex';
                }, 4500);

            } else {
                // Regular leaderboard list with ANIMATED REORDERING (#Kahoot Style)
                document.getElementById('list-card').style.display = 'block';
                const lbList = document.getElementById('leaderboard');
                lbList.className = 'leaderboard-list';
                
                // Only show TOP 5
                const topPlayers = players.slice(0, 5);
                
                // Create elements if they don't exist, starting completely hidden and shifted offscreen
                lbList.innerHTML = topPlayers.map((p, i) => `
                    <div id="player-row-${p.nickname.replace(/\s+/g, '-')}" class="leaderboard-item" style="opacity: 0; transform: translateX(-150vw) 0px) scale(0.5);">
                        <span class="rank">${i + 1}</span>
                        <span class="avatar">${p.avatar || '👤'}</span>
                        <div class="nickname">
                            <span>${p.nickname}</span>
                            <small>${p.team}</small>
                        </div>
                        <div class="score-container">
                            <div class="score" id="score-val-${p.nickname.replace(/\s+/g, '-')}">0</div>
                            ${p.streak > 1 ? `<div class="streak-fire">${p.streak}🔥</div>` : ''}
                        </div>
                    </div>
                `).join('');

                // Epic Staggered Animation Sequence
                setTimeout(() => {
                    topPlayers.forEach((p, i) => {
                        setTimeout(() => {
                            const row = document.getElementById(`player-row-${p.nickname.replace(/\s+/g, '-')}`);
                            const scoreEl = document.getElementById(`score-val-${p.nickname.replace(/\s+/g, '-')}`);
                            
                            // 1. Epic slide and pop entry
                            row.style.animation = `slideInEpic 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards`;
                            setTimeout(() => {
                                // Lock the final Y coordinate so it doesn't snap back when animation ends, but transition takes over
                                row.style.animation = 'none';
                                row.style.opacity = '1';
                                row.style.transform = `translateY(${i * 100}px)`;
                            }, 800);
                            
                            try { new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3').play().catch(()=>{}); } catch(e){}
                            
                            // 2. Count up score dramatically
                            let targetScore = p.score;
                            let duration = 1500;
                            let startTime = performance.now();
                            
                            function updateScore(now) {
                                let elapsed = now - startTime;
                                let progress = Math.min(elapsed / duration, 1);
                                // easeOutExpo
                                let easedProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                                let currentScore = Math.floor(easedProgress * targetScore);
                                scoreEl.textContent = currentScore + ' pt';
                                
                                if (progress < 1) requestAnimationFrame(updateScore);
                                else {
                                    // Highlight top positions when done counting
                                    if (i === 0) { row.classList.add('top-1'); try { new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3').play().catch(()=>{}); } catch(e){} }
                                    else if (i === 1) row.classList.add('top-2');
                                    else if (i === 2) row.classList.add('top-3');
                                }
                            }
                            requestAnimationFrame(updateScore);
                        }, i * 600); // 600ms stagger between each player entering
                    });
                }, 500);

                if (nextIdx) {
                    document.getElementById('host-controls').style.display = 'flex';
                    document.getElementById('btn-next').onclick = () => {
                        window.location.href = `host-quiz.html?gameId=${gameId}&index=${nextIdx}`;
                    };
                }

                // Takım Liderlik Tablosu
                const teamScores = {};
                players.forEach(p => {
                    if (p.team && p.team !== 'Bireysel' && p.score >= 0) {
                        teamScores[p.team] = (teamScores[p.team] || 0) + p.score;
                    }
                });
                if (Object.keys(teamScores).length > 0) {
                    const teamRows = Object.entries(teamScores).sort(([,a],[,b]) => b - a)
                        .map(([team, score]) => {
                            const icon = team === 'Kırmızı' ? '🔴' : team === 'Mavi' ? '🔵' : '🤝';
                            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:0.75rem 1rem;background:var(--glass-bg);border-radius:12px;font-weight:800;font-size:1.1rem;"><span>${icon} ${team}</span><span style="color:var(--success);">${score} pt</span></div>`;
                        }).join('');
                    const teamDiv = document.createElement('div');
                    teamDiv.innerHTML = `<div style="margin-top:2rem;"><p style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.75rem;font-weight:700;">TAKIM SKORU</p><div style="display:flex;flex-direction:column;gap:0.5rem;">${teamRows}</div></div>`;
                    document.getElementById('list-card').appendChild(teamDiv);
                }
            }

            // Branding & Status apply
            const { data: g } = await client.from('games').select('branding_color, status').eq('id', gameId).single();
            if(g && g.branding_color) document.documentElement.style.setProperty('--primary', g.branding_color);

            // Eğer oyuncu sonuç ekranına girdiğinde host çoktan yeni soruyu başlattıysa (in_progress), bekletme direkt sok
            if (g && g.status === 'in_progress' && !nextIdx && !isFinal) {
                window.location.href = `quiz.html?gameId=${gameId}&playerId=${playerId}`;
                return;
            }

            // Player side: Listen for next question
            if (!nextIdx && !isFinal) {
                client.channel('game-sync').on('postgres_changes', { 
                    event: 'UPDATE', schema: 'public', table: 'games', filter: `id=eq.${gameId}` 
                }, (payload) => {
                    if (payload.new.status === 'in_progress') {
                        window.location.href = `quiz.html?gameId=${gameId}&playerId=${playerId}`;
                    }
                }).subscribe();
            }

            // Reaction UI showing & setup
            if (playerId) {
                document.getElementById('reaction-bar').style.display = 'block';
            }
            setupReactions();
        }

        // Reaction Logic
        window.sendReaction = async function(e, emojiText) {
            await client.from('reactions').insert([{ game_id: gameId, emoji: emojiText }]);
            if (e && e.currentTarget) {
                const btn = e.currentTarget;
                btn.style.transform = 'scale(0.9)';
                setTimeout(() => btn.style.transform = '', 150);
            }
        };

        function setupReactions() {
            client.channel('reactions').on('postgres_changes', { 
                event: 'INSERT', schema: 'public', table: 'reactions', filter: `game_id=eq.${gameId}` 
            }, (p) => {
                const emoji = p.new.emoji;
                const el = document.createElement('div');
                el.className = 'floating-reaction';
                el.innerText = emoji;
                
                // Dağınık pozisyonlanması için rastgelelik
                const isLeft = Math.random() > 0.5;
                if (isLeft) {
                    el.style.left = Math.random() * 30 + 5 + '%';
                } else {
                    el.style.right = Math.random() * 30 + 5 + '%';
                }

                document.getElementById('reaction-container').appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }).subscribe();
        }
        
        load();
    </script>
</body>
</html>
